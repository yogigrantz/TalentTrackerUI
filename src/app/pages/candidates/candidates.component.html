<div class="container mt-4">

  <h2 class="mb-4">Candidates</h2>

  <table class="table table-striped table-hover table-bordered align-middle">

    <thead class="table-dark">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>City</th>
        <th>Profession</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of candidates">
        <td>{{ c.name }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.phone }}</td>
        <td>{{ c.city }}, {{ c.state }}</td>
        <td>{{ c.profession }}</td>
      </tr>
    </tbody>

  </table>
<button routerLink="/candidate/add" class="add-btn">
  + Add Candidate
</button>

</div>
