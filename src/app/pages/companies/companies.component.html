<div class="container mt-4">

  <h2 class="mb-4">Companies</h2>

  <table class="table table-striped table-hover table-bordered align-middle company-table">

    <thead class="table-dark">
      <tr>
        <th>Company</th>
        <th>Contact</th>
        <th>Phone</th>
        <th>Email</th>
        <th>Website</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let company of companies">
        <td>{{ company.companyName }}</td>
        <td>{{ company.contactName }}</td>
        <td>{{ company.phone }}</td>
        <td>{{ company.email }}</td>
        <td>
          <a [href]="company.website" target="_blank">
            {{ company.website }}
          </a>
        </td>
      </tr>
    </tbody>

  </table>

  <button routerLink="/company/add" class="add-btn">
    + Add Company
  </button>

</div>
