<div class="app-shell">
<header class="topbar">
<div class="brand">
<span class="logo">TT</span>
<span class="title">TalenTrack</span>
</div>
</header>

<main class="content">
    <div class="breadcrumb" *ngIf="isLoggedIn()">
        <div class="top-menu">

            <div class="menu-left">
                <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
                <a routerLink="/candidates" routerLinkActive="active">Candidates</a>
                <a routerLink="/companies" routerLinkActive="active">Companies</a>
                <a routerLink="/clients" routerLinkActive="active">Clients</a>
                <a routerLink="/jobs" routerLinkActive="active">Jobs</a>
                <a routerLink="/placements" routerLinkActive="active">Placements</a>
            </div>

            <div class="menu-right">
                <button class="logout-btn" (click)="logout()">Logout</button>
            </div>

        </div>
    </div>

    <div class="main-container">
        <router-outlet></router-outlet>
    </div>
</main>

<footer class="footer">
© 2026 TalenTrack • Built with Angular & .NET
</footer>
</div>
